name: Build & test (container)

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_install_test:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/${{ github.repository_owner }}/aetherion-ci:base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ccache (runtime)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ccache
          rm -rf /var/lib/apt/lists/*

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /root/.cache/ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          ccache --version
          ccache --set-config=max_size=1G
          ccache --show-config

      - name: Build, install, and test
        env:
          CCACHE_DIR: /root/.cache/ccache
          CCACHE_BASEDIR: ${{ github.workspace }}
          CCACHE_COMPRESS: "true"
          CMAKE_ARGS: >-
            -DCMAKE_C_COMPILER_LAUNCHER=ccache
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
        run: |
          make build-install-test

      - name: ccache stats
        if: always()
        run: |
          ccache --show-stats || true

      - name: Upload build artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aetherion-build-artifacts
          if-no-files-found: ignore
          path: |
            dist/**
            wheelhouse/**
            coverage.xml
            htmlcov/**
